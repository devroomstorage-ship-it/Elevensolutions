databases:
  - name: eleven-solutions-db
    databaseName: eleven_solutions
    user: eleven
    plan: free
    region: frankfurt

services:
  - type: web
    name: eleven-solutions-backend
    runtime: node
    rootDir: backend
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eleven-solutions-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REQUIRE_2FA
        value: "false"
      - key: TOTP_ISSUER
        value: ElevenSolutions
      - key: CORS_ORIGINS
        value: https://eleven-solutions-frontend.onrender.com
      - key: PUBLIC_SITE_URL
        value: https://eleven-solutions-frontend.onrender.com
      - key: PORTAL_URL
        value: https://eleven-solutions-frontend.onrender.com/portal
      - key: EMAIL_TRANSPORT
        value: mailtrap
      - key: MAILTRAP_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: info@elevensolutions.co.ke
      - key: EMAIL_FROM_NAME
        value: Eleven Solutions Limited
      - key: GOOGLE_MAPS_SERVER_KEY
        sync: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_REDIRECT_URI
        value: https://eleven-solutions-backend.onrender.com/api/quickbooks/callback
      - key: QB_SANDBOX
        value: "true"

  - type: web
    name: eleven-solutions-frontend
    runtime: node
    rootDir: frontend
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://eleven-solutions-backend.onrender.com/api
      - key: NEXT_PUBLIC_SITE_URL
        value: https://eleven-solutions-frontend.onrender.com
      - key: NEXT_PUBLIC_COMPANY_NAME
        value: Eleven Solutions Limited
      - key: NEXT_PUBLIC_COMPANY_PHONE
        value: "+254 700 000 000"
      - key: NEXT_PUBLIC_COMPANY_EMAIL
        value: info@elevensolutions.co.ke
      - key: NEXT_PUBLIC_GOOGLE_MAPS_KEY
        sync: false