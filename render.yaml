# ──────────────────────────────────────────────────────────────────────────────
# render.yaml — full Eleven Solutions stack on Render (database + API + site)
#
# Put this file at the REPOSITORY ROOT, commit it, then in Render:
#   New +  →  Blueprint  →  select this repo  →  Apply
#
# It provisions THREE resources and wires them together automatically:
#   1. a managed PostgreSQL database
#   2. the Express backend  (connects to the DB via its internal URL)
#   3. the Next.js frontend (points at the backend's public URL)
#
# You only fill in a handful of secrets when prompted (JWT secrets, SendGrid,
# QuickBooks, Google Maps). Everything else is set here.
# ──────────────────────────────────────────────────────────────────────────────

databases:
  - name: eleven-solutions-db
    databaseName: eleven_solutions
    user: eleven
    plan: free
    region: frankfurt          # closest free region to Kenya; keep all 3 in the SAME region

services:
  # ── Backend API (Express) ───────────────────────────────────────────────────
  - type: web
    name: eleven-solutions-backend
    runtime: node
    rootDir: backend
    region: frankfurt
    plan: free
    # Install deps, then run DB migrations on every deploy (idempotent — safe to re-run)
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths: [backend/**]
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # DB connection string is injected automatically from the database above
      - key: DATABASE_URL
        fromDatabase:
          name: eleven-solutions-db
          property: connectionString
      # Auth secrets — Render generates strong random values for these
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # CORS — allow the frontend (update the URL after first deploy if it differs)
      - key: CORS_ORIGINS
        value: https://eleven-solutions-frontend.onrender.com
      - key: PORTAL_URL
        value: https://eleven-solutions-frontend.onrender.com/portal
      - key: PUBLIC_SITE_URL
        value: https://eleven-solutions-frontend.onrender.com
      # Secrets you paste in the dashboard (never committed). sync:false = prompt me.
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: info@elevensolutions.co.ke
      - key: GOOGLE_MAPS_SERVER_KEY
        sync: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_REDIRECT_URI
        value: https://eleven-solutions-backend.onrender.com/api/quickbooks/callback
      - key: QB_SANDBOX
        value: "true"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  - type: web
    name: eleven-solutions-frontend
    runtime: node
    rootDir: frontend
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    buildFilter:
      paths: [frontend/**]
    envVars:
      - key: NODE_VERSION
        value: "20"
      # NEXT_PUBLIC_* is read at BUILD time and points the site at the API
      - key: NEXT_PUBLIC_API_URL
        value: https://eleven-solutions-backend.onrender.com/api
      # Browser Google Maps key (referrer-restricted). Optional — site degrades gracefully.
      - key: NEXT_PUBLIC_GOOGLE_MAPS_KEY
        sync: false
